name: Release fork-db

permissions: {}

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: "Dry run (no publish, no push)"
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # master
        with:
          toolchain: stable

      - name: Install tools
        uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2 # master
        with:
          tool: cargo-release,git-cliff,cargo-semver-checks

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update changelog
        working-directory: crates/fork-db
        run: git cliff --unreleased --tag "fork-db-v$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "foundry-fork-db") | .version')" --prepend CHANGELOG.md

      - name: Semver checks
        run: cargo semver-checks -p foundry-fork-db

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
        if: ${{ inputs.dry-run == false }}

      - name: Release
        run: |
          FLAGS=""
          if [ "${{ inputs.dry-run }}" = "false" ]; then
            FLAGS="--execute --no-confirm"
          fi
          cargo release ${{ inputs.bump }} \
            -p foundry-fork-db \
            $FLAGS
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          PUBLISH_GRACE_SLEEP: "10"
