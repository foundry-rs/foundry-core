name: Release

permissions: {}

on:
  workflow_call:
    inputs:
      crate:
        description: "Crate name (e.g. foundry-compilers)"
        required: true
        type: string
      packages:
        description: "cargo-release -p flags for all packages to publish"
        required: true
        type: string
      include-path:
        description: "Path filter for changelog generation"
        required: true
        type: string
      tag-prefix:
        description: "Tag prefix to strip for version extraction (e.g. foundry-compilers-v)"
        required: true
        type: string
      dry-run:
        description: "Run without publishing or creating a release"
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # master
        with:
          toolchain: stable
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2 # master
        with:
          tool: cargo-release
      - name: Validate version
        env:
          TAG: ${{ github.ref_name }}
          TAG_PREFIX: ${{ inputs.tag-prefix }}
        run: |
          VERSION="${TAG#"$TAG_PREFIX"}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$VERSION' is not valid semver"
            exit 1
          fi
      - name: Dry run
        env:
          PACKAGES: ${{ inputs.packages }}
        run: cargo release publish $PACKAGES --allow-branch HEAD --no-confirm
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        if: ${{ !inputs.dry-run }}
        id: auth
      - name: Publish crates
        if: ${{ !inputs.dry-run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          PUBLISH_GRACE_SLEEP: "30"
          PACKAGES: ${{ inputs.packages }}
        run: cargo release publish $PACKAGES --allow-branch HEAD --execute --no-confirm

  release:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2 # master
        with:
          tool: git-cliff
      - name: Generate changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
          INCLUDE: ${{ inputs.include-path }}
        run: git-cliff --latest --strip header --include-path "$INCLUDE" -o RELEASE_NOTES.md
      - name: Print changelog
        run: cat RELEASE_NOTES.md
      - name: Create GitHub release
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          TAG_PREFIX: ${{ inputs.tag-prefix }}
          CRATE: ${{ inputs.crate }}
        run: |
          VERSION="${TAG_NAME#"$TAG_PREFIX"}"
          gh release create "$TAG_NAME" --title "$CRATE v$VERSION" --notes-file RELEASE_NOTES.md
