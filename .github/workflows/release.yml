name: Release

permissions: {}

on:
  push:
    tags:
      - "compilers-v*"
      - "explorers-v*"
      - "fork-db-v*"
      - "wallets-v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      id-token: write
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # master
        with:
          toolchain: stable

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Publish compilers
        if: startsWith(github.ref_name, 'compilers-v')
        run: |
          PUBLISH_GRACE_SLEEP=10 cargo publish -p foundry-compilers-core
          PUBLISH_GRACE_SLEEP=10 cargo publish -p foundry-compilers-artifacts-solc
          PUBLISH_GRACE_SLEEP=10 cargo publish -p foundry-compilers-artifacts-vyper
          PUBLISH_GRACE_SLEEP=10 cargo publish -p foundry-compilers-artifacts
          cargo publish -p foundry-compilers
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish explorers
        if: startsWith(github.ref_name, 'explorers-v')
        run: |
          PUBLISH_GRACE_SLEEP=10 cargo publish -p foundry-block-explorers
          cargo publish -p foundry-blob-explorers
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish fork-db
        if: startsWith(github.ref_name, 'fork-db-v')
        run: cargo publish -p foundry-fork-db
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish wallets
        if: startsWith(github.ref_name, 'wallets-v')
        run: cargo publish -p foundry-wallets
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Create GitHub release
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
