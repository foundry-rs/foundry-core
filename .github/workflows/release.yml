name: Release

permissions: {}

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish"
        required: true
        type: choice
        options:
          - all
          - foundry-compilers
          - foundry-fork-db
          - foundry-wallets

jobs:
  semver-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # master
        with:
          toolchain: stable
      - uses: obi1kenobi/cargo-semver-checks-action@7272cc2caa468d3e009a2b0a9cc366571a50d57b # v2

  release:
    needs: semver-checks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2 # master
        with:
          tool: git-cliff
      - name: Generate changelog
        run: git-cliff --latest --strip header -o RELEASE_NOTES.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file RELEASE_NOTES.md

  publish:
    needs: [semver-checks, release]
    if: ${{ !cancelled() && needs.semver-checks.result == 'success' && (needs.release.result == 'success' || needs.release.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # master
        with:
          toolchain: stable
      - uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1
        id: auth

      # foundry-compilers (+ dependencies)
      - run: cargo publish -p foundry-compilers-core
        if: inputs.crate == 'all' || inputs.crate == 'foundry-compilers' || github.event_name == 'push'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - run: cargo publish -p foundry-compilers-artifacts-solc
        if: inputs.crate == 'all' || inputs.crate == 'foundry-compilers' || github.event_name == 'push'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - run: cargo publish -p foundry-compilers-artifacts-vyper
        if: inputs.crate == 'all' || inputs.crate == 'foundry-compilers' || github.event_name == 'push'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - run: cargo publish -p foundry-compilers-artifacts
        if: inputs.crate == 'all' || inputs.crate == 'foundry-compilers' || github.event_name == 'push'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - run: cargo publish -p foundry-compilers
        if: inputs.crate == 'all' || inputs.crate == 'foundry-compilers' || github.event_name == 'push'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # foundry-fork-db
      - run: cargo publish -p foundry-fork-db
        if: inputs.crate == 'all' || inputs.crate == 'foundry-fork-db' || github.event_name == 'push'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # foundry-wallets
      - run: cargo publish -p foundry-wallets
        if: inputs.crate == 'all' || inputs.crate == 'foundry-wallets' || github.event_name == 'push'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
