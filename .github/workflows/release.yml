name: Release

permissions: {}

on:
  push:
    tags: ["v*"]

jobs:
  semver-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # master
        with:
          toolchain: stable
      - uses: obi1kenobi/cargo-semver-checks-action@7272cc2caa468d3e009a2b0a9cc366571a50d57b # v2
      
  release:
    needs: semver-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2 # master
        with:
          tool: git-cliff
      - name: Generate changelog
        run: git-cliff --latest --strip header -o RELEASE_NOTES.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file RELEASE_NOTES.md

  publish:
    needs: release
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # master
        with:
          toolchain: stable
      - uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1
        id: auth
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          publish_if_new() {
            local crate="$1"
            local version
            version=$(cargo metadata --no-deps --format-version 1 | jq -r ".packages[] | select(.name == \"$crate\") | .version")
            if curl -s "https://crates.io/api/v1/crates/$crate/$version" | jq -e '.version' > /dev/null 2>&1; then
              echo "Skipping $crate@$version (already published)"
            else
              echo "Publishing $crate@$version"
              cargo publish -p "$crate"
            fi
          }

          # Publish in dependency order
          publish_if_new foundry-compilers-core
          publish_if_new foundry-compilers-artifacts-solc
          publish_if_new foundry-compilers-artifacts-vyper
          publish_if_new foundry-compilers-artifacts
          publish_if_new foundry-compilers
          publish_if_new foundry-fork-db
          publish_if_new foundry-wallets
